name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build, test & release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub Releases

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Build (production)
        run: bun run clean && NODE_ENV=production bun run task/build

      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VERSION=$(node -e "process.stdout.write(require('./dist/manifest.json').version)")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ manifest.json version ($MANIFEST_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "✓ Version $MANIFEST_VERSION matches tag"

      - name: Run Snyk dependency audit
        run: npx snyk test --dev --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: ${{ secrets.SNYK_TOKEN == '' }}

      - name: Run Playwright tests
        run: BUILD_MODE=prod npx playwright test --project extension-prod

      - name: Package extension
        run: |
          cd dist
          zip -r ../json-formatter-${{ github.ref_name }}.zip .
          cd ..
          echo "CHECKSUM=$(shasum -a 256 json-formatter-${{ github.ref_name }}.zip | awk '{print $1}')" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: json-formatter-${{ github.ref_name }}.zip
          generate_release_notes: true
          body: |
            ## Installation

            1. Download `json-formatter-${{ github.ref_name }}.zip`
            2. Unzip it
            3. Open `chrome://extensions`, enable **Developer mode**
            4. Click **Load unpacked** and select the unzipped folder

            **SHA-256:** `${{ env.CHECKSUM }}`
