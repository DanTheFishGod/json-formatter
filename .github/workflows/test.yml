name: Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Build (production)
        run: NODE_ENV=production bun run task/build

      - name: Run Snyk dependency audit
        run: npx snyk test --dev --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        # Allow the workflow to continue if Snyk token is not configured,
        # but fail on HIGH/CRITICAL vulnerabilities when it is.
        continue-on-error: ${{ secrets.SNYK_TOKEN == '' }}

      - name: Run Playwright tests
        run: BUILD_MODE=prod npx playwright test --project extension-prod

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
